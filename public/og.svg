			<stop offset="0%" stop-color="#f7f5f0"/>
			<stop offset="100%" stop-color="#efebe2"/>
		</linearGradient>
		<linearGradient id="acc" x1="0" y1="0" x2="1" y2="0">
			<stop offset="0%" stop-color="#b85c4f"/>
			<stop offset="100%" stop-color="#d98a7d"/>
		</linearGradient>
		<filter id="noise">
			<feTurbulence type="fractalNoise" baseFrequency="0.85" numOctaves="2"/>
